<!DOCTYPE html>
<html lang="en">
    <!-- head.html START -->
        <meta name="description" content="The CappaShare website made by Casper, Sam and Noah. (Testing page)">
    <!-- head.html END -->
    <body>
        <!-- nav.html HERE -->

        <div id="hero">
            <h1>Upload your file/s</h1>
        </div>       
        
        <main id="main">
            <form id="uploadForm" class="filePage" method="post" action="/api/upload" enctype="multipart/form-data">
                <div class="flex boxevil">
                    <div ondrag="console.log('ondrag')" class="box">
                        <img alt="Upload cloud image." src="/images/cappa the manlet is a silly ahh ahh goober.webp" style="width: 100px; height: 100px;">
                        <p>Drag and Drop</p>
                        <br>
                        or
                        <br>
                        <input type="file" id="file" name="file" style="margin: 25px;">
                    </div>
                    <div class="flex vertical">
                        <input class="box big-text" type="text" id="title" name="title" placeholder="Add Title Here" size="4">
                        <textarea class="box" type="text" id="description" name="description" rows="4" cols="50" placeholder="Add Description Here" ></textarea>
                    </div>
                </div>
                <input class="disabled" type="submit" value="Upload File" style="margin: 50px; font-size: 35px;">
            </form>
            <script src="/scripts/uploadForm.js"></script>
        </main>
        <div id="loadingModal" class="modal">
            <!-- Modal content -->
            <div class="modal-content flex vertical">
                <div>
                    <h1>Hooray!</h1>
                    <p>Your file is now uploading.</p>
                    <div id="samEvilProgress">
                        <div id="samEvilBar"></div>
                    </div>
                </div>
                <div class="buttons flex">
                    <button onclick="closeModal()">return</button>
                </div>
            </div>
        </div>
        <!-- footer.html HERE -->
    </body>
</html>
