<!DOCTYPE html>
<html lang="en">
    <!-- head.html START -->
    <meta
        name="description"
        content="The CappaShare website made by Casper, Sam and Noah. (Testing page)"
    >
    <!-- head.html END -->
    <style>
        .modal {
            position: absolute; /* Stay in place */
            z-index: 1; /* Sit on top */
            left: 0;
            top: 100lvh;
            width: 100vw; /* Full width */
            height: 100vh; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: rgb(0, 0, 0); /* Fallback color */
            background-color: rgba(0, 0, 0, 0.4); /* Black w/ opacity */
            margin: 0;
            transition: top 0.5s ease-in-out;
        }

        .modal-content {
            background-color: #000000;
            margin: 25% auto; /* 15% from the top and centered */
            padding: 20px;
            border: 1px solid #888;
            width: 80%; /* Could be more or less, depending on screen size */
        }

        .buttons > * {
            margin: 10px;
        }

        /* Add Animation */
        @keyframes animatetop {
            from {top: -300px; opacity: 0}
            to {top: 0; opacity: 1}
        }
    </style>
    <body>
        <!-- nav.html HERE -->

        <div id="hero">
            <h1>CappaShare</h1>
            <h2>Test Time :)</h2>
        </div>

        <main id="main">
            <!-- Trigger/Open The Modal -->
            <button id="button" onclick="openModal()">Modal</button>
        </main>

        
        <!-- The Modal -->
        <div id="myModal" class="modal">
            <!-- Modal content -->
            <div class="modal-content flex vertical">
                <div>
                    <p>Possibly evil file</p>
                </div>
                <div class="buttons flex">
                    <button>proceed</button>
                    <button onclick="closeModal()">return</button>
                </div>
            </div>
        </div>

        <script>
            // Get the modal
            var modal = document.getElementById("myModal");

            modal.onclick = function (e) {
                if (e.target == modal) {
                    closeModal();
                }
            }

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeModal();
                }
            })

            function openModal() {
                modal.style.top = "0";
            }

            function closeModal() {
                modal.style.top = "100lvh";
            }
        </script>
        <!-- footer.html HERE -->
    </body>
</html>
