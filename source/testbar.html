<!DOCTYPE html>
<html lang="en">
    <!-- head.html START -->
        <meta name="description" content="The CappaShare website made by Casper, Sam and Noah. (Testing page)">
    <!-- head.html END -->
    <body>
        <!-- nav.html HERE -->

        <div id="hero">
            <h1>CappaShare</h1>
            <h2>I have a cool slogan</h2>
        </div>       
        
        <main id="main">
            <div class="samEvilProgress">
                <div class="samEvilBar"><p>0%</p></div>
            </div>
            <br>
            <button onclick="move()">Load my thing</button>
            <button onclick="width = 0; stopLoading();">Reset</button>
            <script>
                const container = document.getElementsByClassName("samEvilProgress")[0];
                const elem = container.getElementsByClassName("samEvilBar")[0];
                const text = elem.getElementsByTagName("p")[0];
                
                let i = 0;
                let width = 0;
                let velocity = 0;
                let id;

                function frame() {
                    if (width < 100) {
                        velocity += (Math.random() - 0.1)/10;
                        velocity = clamp(velocity*0.8, -1, 1);
                        width += velocity;
                        width = clamp(width, 0, 100);
                        updateProgress();
                    } else {
                        stopLoading();
                    }
                }
                
                function move() {
                    if (i == 0) {
                        i = 1;
                        id = setInterval(frame, 10);
                    }
                }

                function stopLoading() {
                    clearInterval(id);
                    i = 0;
                    velocity = 0;
                    updateProgress();
                    alert("Huzzah!");
                }

                function updateProgress() {
                    elem.style.width = width + "%";
                    text.innerText = Math.round(width) + "%";
                }
            </script>
        </main>

        <!-- footer.html HERE -->
    </body>
</html>
