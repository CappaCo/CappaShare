<!DOCTYPE html>
<html lang="en">
    <!-- head.html START -->
        <meta name="description" content="The CappaShare website made by Casper, Sam and Noah.">
        <style>
            #hero {
                padding: 125px 0;
            }
        </style>
    <!-- head.html END -->
    <body>
        <!-- nav.html HERE -->

        <div id="hero">
            <h1>CappaShare</h1>
            <h2>Upload and download files</h2>
            <!-- searchbar.html HERE -->
        </div>
        
        <main id="main">
            <h2>We allow people to upload and download files</h2>
            <div class="evilflex">
                <a class="button secondary" href="/upload">Upload</a>
                <a class="button" href="/search">Download</a>
            </div>

            <h2>Most recent files</h2>
            <div id="fileList" class="fileList">
                <p style="color: var(--primary);">Loading... (Noah needs to make a design for files loading here)</p>
            </div>
        </main>

        <div id="warningModal" class="modal">
            <!-- Modal content -->
            <div class="modal-content flex vertical">
                <div>
                    <p>This file is unverified and could be dangerous, do you wish to download it anyway?</p>
                </div>
                <div class="buttons flex">
                    <a class="button secondary" id="warningModalLink">proceed</a>
                    <button class="closeButton">return</button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
        <script defer src="/scripts/download.js"></script>

        <!-- footer.html HERE -->
    </body>
</html>
