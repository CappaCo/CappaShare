            .fileList {
                display: flex;
                flex-direction: column;

                border-radius: 16px;
                display: flex;
                justify-content: space-between;

                margin: 0px 16px;
            }

            .fileList * {
                color: var(--secondary);

            .fileList > a:hover {
                text-decoration: none;
                background-color: var(--primary-hover)
            }

            .fileList > a > div {
                display: flex;
            }

            .fileList > a > div > * {

            }
